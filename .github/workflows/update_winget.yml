name: Update Winget

on:
  release:
    types:
      - published

jobs:
  winget:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Install Komac
        uses: taiki-e/install-action@v2
        with:
          tool: komac

      - name: Submit manifest
        env:
          GITHUB_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"

          URL="https://github.com/${{ github.repository }}/releases/download/$TAG/DiskInfo.zip"

          komac update HoangLong.DiskInfo \
            --version "$TAG" \
            --urls "$URL" \
            --submit
