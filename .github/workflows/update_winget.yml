name: Update Winget

on:
  push:
    tags:
      - "*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  winget:
    runs-on: windows-latest

    steps:
      - name: Validate tag
        shell: pwsh
        run: |
          echo $env:GITHUB_REF_NAME | Select-String "[0-9]"

      - name: Install Komac
        shell: pwsh
        run: |
          winget install --id RussellBanks.Komac --exact --accept-package-agreements --accept-source-agreements
          $KomacPath = "C:\Users\runneradmin\AppData\Local\Microsoft\WinGet\Links\komac.exe"
          echo "KOMAC_PATH=$KomacPath" >> $env:GITHUB_ENV
          & $KomacPath --version

      - name: Submit manifest
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          $TAG = $env:GITHUB_REF_NAME

          $URL = "https://github.com/${{ github.repository }}/releases/download/$TAG/DiskInfo.zip"

          & $env:KOMAC_PATH update --identifier HoangLong.DiskInfo --version $TAG --urls $URL --submit