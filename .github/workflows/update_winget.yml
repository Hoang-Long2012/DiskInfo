name: Update Winget

on:
  release:
    types:
      - published

jobs:
  winget:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Install Komac
        uses: taiki-e/install-action@v2
        with:
          tool: komac

      - name: Submit manifest
        env:
          GITHUB_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"

          URL="https://github.com/${{ github.repository }}/releases/download/$TAG/DiskInfo.zip"

          komac update HoangLong.DiskInfo \
            --version "$TAG" \
            --urls "$URL" \
            --architecture x64 \
            --submit

      - name: Clone winget-pkgs fork
        run: |
          git clone https://x-access-token:${{ secrets.WINGET_TOKEN }}@github.com/${{ github.actor }}/winget-pkgs.git winget-pkgs

      - name: Copy manifest back to repo
        run: |
          TAG="${{ github.event.release.tag_name }}"

          SRC="winget-pkgs/manifests/h/HoangLong/DiskInfo/$TAG"
          DST="manifests/h/HoangLong/DiskInfo/$TAG"

          mkdir -p "$(dirname "$DST")"

          cp -r "$SRC" "$DST"

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add manifests

          git diff --cached --quiet && exit 0

          git commit -m "Add manifest ${{ github.event.release.tag_name }}"
          git push