name: Update Winget

on:
  release:
    types:
      - published

jobs:
  winget:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install WingetCreate
        run: |
          dotnet tool install --global wingetcreate

      - name: Submit manifest
        env:
          WINGETCREATE_GITHUB_TOKEN: ${{ secrets.WINGET_TOKEN }}
        shell: pwsh
        run: |
          $Tag = "${{ github.event.release.tag_name }}"
          $Url = "https://github.com/${{ github.repository }}/releases/download/$Tag/DiskInfo.zip"

          wingetcreate update HoangLong.DiskInfo `
            --version $Tag `
            --urls $Url `
            --release-note-url https://github.com/Hoang-Long2012/DiskInfo/blob/main/CHANGELOG.md `
            --submit